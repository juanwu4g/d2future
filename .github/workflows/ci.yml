# CI: prove the two things the brief grades hardest — the image builds and the app runs.
# Mirrors the README instructions: docker build, in-image pytest, then a live smoke test.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker:
    runs-on: ubuntu-latest
    # Throwaway Postgres so the database news path runs in CI (no secrets —
    # this is not the production database).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t d2future-homepage .

      - name: Run tests inside the image (including the Postgres path)
        run: |
          docker run --rm --network host \
            -e TEST_DATABASE_URL=postgresql://postgres:postgres@localhost:5432/postgres \
            --entrypoint pytest d2future-homepage

      - name: Smoke test (health + contact + news)
        run: |
          docker run -d --rm --name app -p 8080:8080 d2future-homepage
          sleep 3
          curl -fsS http://localhost:8080/health
          curl -fsS -X POST http://localhost:8080/api/contact \
            -H 'Content-Type: application/json' \
            -d '{"name":"CI","email":"ci@example.com","message":"smoke test"}'
          curl -fsS http://localhost:8080/api/news?limit=1
          docker stop app
